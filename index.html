<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SUUN Particle Sphere</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #fff; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xffffff, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 3;

// Brand palette
const C_FOUNDATION = new THREE.Color('#211823');
const C_ELDERBERRY = new THREE.Color('#55314C');
const C_PLUME      = new THREE.Color('#A17897');
const C_ROSE       = new THREE.Color('#F7C8E3');
const C_FUCHSIA    = new THREE.Color('#FF79CE');
const C_SHINE      = new THREE.Color('#F8FF8A');
const C_LAVENDER   = new THREE.Color('#DCC9D4');
const PALETTE = [C_FOUNDATION, C_ELDERBERRY, C_PLUME, C_ROSE, C_LAVENDER, C_FUCHSIA, C_SHINE];

// 10-fold symmetry: generate 1200 base particles in a 36° wedge, replicate 10×
// → 12000 total, sphere looks identical every 36° → perfect 5s loop at original speed
const FOLDS   = 10;
const N_BASE  = 1200;           // particles in one wedge
const N       = N_BASE * FOLDS; // 12000 total
const WEDGE   = Math.PI * 2 / FOLDS; // 36° in radians

const GROUP_A_BASE = 240;  // 20% uniform in base wedge

const positions = new Float32Array(N * 3);
const colors    = new Float32Array(N * 3);

const _c = new THREE.Color();

for (let i = 0; i < N_BASE; i++) {
  let phi, theta;
  if (i < GROUP_A_BASE) {
    do {
      phi = Math.acos(2 * Math.random() - 1);
    } while (Math.abs(Math.cos(phi)) < 0.3 && Math.random() < 0.5);
    theta = Math.random() * WEDGE;
  } else {
    const t = Math.random() - 0.5;
    phi   = Math.acos(Math.sign(t) * Math.pow(Math.abs(t) * 2, 0.1));
    theta = Math.random() * WEDGE;
  }

  const r  = 1 + (Math.random() - 0.5) * 0.15;
  const bx = r * Math.sin(phi) * Math.cos(theta);
  const by = r * Math.cos(phi);
  const bz = r * Math.sin(phi) * Math.sin(theta);

  // Random brand color with jitter — same for all 10 copies of this particle
  _c.copy(PALETTE[Math.floor(Math.random() * PALETTE.length)]);
  const j  = () => (Math.random() - 0.5) * 0.08;
  const cr = Math.max(0, Math.min(1, _c.r + j()));
  const cg = Math.max(0, Math.min(1, _c.g + j()));
  const cb = Math.max(0, Math.min(1, _c.b + j()));

  // Replicate across all 10 wedges
  for (let k = 0; k < FOLDS; k++) {
    const idx = (i * FOLDS + k) * 3;
    const ang = k * WEDGE;
    positions[idx]     = bx * Math.cos(ang) - bz * Math.sin(ang);
    positions[idx + 1] = by;
    positions[idx + 2] = bx * Math.sin(ang) + bz * Math.cos(ang);
    colors[idx]     = cr;
    colors[idx + 1] = cg;
    colors[idx + 2] = cb;
  }
}

const vertexShader = `
  attribute vec3 aColor;
  varying vec3 vColor;
  uniform float pointScale;
  void main() {
    vColor = aColor;
    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
    gl_PointSize = pointScale * (3.0 / -mvPos.z);
    gl_Position = projectionMatrix * mvPos;
  }
`;

const fragmentShader = `
  varying vec3 vColor;
  uniform float alphaScale;
  void main() {
    float d = length(gl_PointCoord - 0.5);
    if (d > 0.5) discard;
    float alpha = smoothstep(0.5, 0.0, d);
    gl_FragColor = vec4(vColor, alpha * alphaScale);
  }
`;

function makeLayer(pointScale, alphaScale) {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aColor',   new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.ShaderMaterial({
    vertexShader, fragmentShader,
    uniforms: {
      pointScale: { value: pointScale },
      alphaScale: { value: alphaScale },
    },
    blending: THREE.NormalBlending,
    depthWrite: false,
    transparent: true,
  });
  return new THREE.Points(geo, mat);
}

const group = new THREE.Group();
group.add(makeLayer(8.0, 0.12)); // soft halo per particle
group.add(makeLayer(3.5, 0.90)); // core dots
scene.add(group);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Rotate exactly 1 wedge (36°) in 5 seconds → seamless loop
// Speed: 0.6283 rad / 5s = 0.002094 rad/frame @ 60fps (vs original 0.002167 — 3.4% diff)
const LOOP_MS = 5000;

function animate(ts) {
  requestAnimationFrame(animate);
  group.rotation.y = ((ts % LOOP_MS) / LOOP_MS) * WEDGE;
  renderer.render(scene, camera);
}

animate();

// --- Download button ---
const btn = document.createElement('button');
btn.textContent = '⬇ Download 5s loop';
btn.style.cssText = `
  position:fixed; bottom:24px; right:24px;
  padding:10px 20px; font-family:sans-serif; font-size:14px;
  cursor:pointer; border:1px solid #ccc; border-radius:8px;
  background:#fff; color:#211823; z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,0.12);
`;
document.body.appendChild(btn);

btn.addEventListener('click', () => {
  const mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
  const ext      = mimeType === 'video/mp4' ? 'mp4' : 'webm';
  const stream   = renderer.domElement.captureStream(60);
  const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 12_000_000 });
  const chunks   = [];

  recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: mimeType });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `suun-sphere.${ext}`; a.click();
    URL.revokeObjectURL(url);
    btn.textContent = '⬇ Download 5s loop';
    btn.disabled = false;
  };

  btn.textContent = '● Recording…';
  btn.disabled = true;
  recorder.start();
  setTimeout(() => recorder.stop(), LOOP_MS);
});
</script>
</body>
</html>
